<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoloCook</title>
<style>
  :root {
    --paper: #FBF8F2;
    --cream: #F5F1EA;
    --ink: #1A1714;
    --ink2: #3A3530;
    --ink3: #6B6359;
    --rule: #D8CEB8;
    --teal: #01696F;
    --gold: #F2C94C;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 Helvetica, Arial, sans-serif;
    line-height: 1.55;
  }
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 80px 28px;
  }
  .eyebrow {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 12px;
  }
  h1 {
    font-family: "Times New Roman", Georgia, serif;
    font-size: 56px;
    font-weight: normal;
    letter-spacing: -0.015em;
    line-height: 1.02;
    margin: 0 0 14px;
  }
  h1 em { color: var(--teal); font-style: italic; }
  .tagline {
    font-size: 16px;
    color: var(--ink3);
    margin-bottom: 50px;
    max-width: 480px;
  }
  .links { display: grid; gap: 14px; }
  a.card {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 22px;
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 14px;
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  a.card:hover {
    transform: translateY(-1px);
    border-color: var(--teal);
  }
  a.card .label {
    font-family: "Times New Roman", Georgia, serif;
    font-size: 22px;
  }
  a.card .sub {
    display: block;
    font-size: 13px;
    color: var(--ink3);
    margin-top: 3px;
  }
  a.card .arrow { color: var(--teal); font-size: 20px; }
  footer {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--ink3); text-align: center;
    margin-top: 80px;
  }
</style>
</head>
<body>
<main>
  <div class="eyebrow">SoloCook · est. 2026</div>
  <h1>Dinner, <em>for one.</em></h1>
  <p class="tagline">
    Cook what's already in your fridge. No families. No meal-prep for
    twelve. Just dinner, for you.
  </p>

  <div class="links">
    <a class="card" href="privacy.html">
      <div>
        <div class="label">Privacy Policy</div>
        <span class="sub">What we collect and why. (Spoiler: nothing.)</span>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="support.html">
      <div>
        <div class="label">Support</div>
        <span class="sub">Broken? Confused? Write to us.</span>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>

  <footer>MADE WITH SOLOCOOK</footer>
</main>
</body>
</html>
